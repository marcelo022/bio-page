<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Agência Digital Premium - Conecte-se conosco e impulsione a sua marca.">
    <meta name="keywords" content="marketing digital, agência digital, tráfego pago, social media, bento link">
    <meta name="theme-color" content="#0A0C10">
    
    <meta property="og:type" content="website">
    <meta property="og:title" content="Agência Digital | Conecte-se">
    <meta property="og:description" content="Transformando marcas em resultados através de estratégias digitais inteligentes.">

    <title>Agência Digital | Links Úteis</title>

    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap-grid.min.css" rel="stylesheet">

    <style>
        :root {
            --bg-main: #0A0C10;
            --bg-sec: #111827;
            --txt-main: #F8FAFC;
            --txt-sec: #CBD5E1;
            --accent: #00FF73;
            --hover: #00D962;
            --font-family: 'Plus Jakarta Sans', sans-serif;
            --glass-bg: rgba(17, 24, 39, 0.55);
            --glass-border: rgba(255, 255, 255, 0.06);
            --glow-shadow: 0 0 25px rgba(0, 255, 115, 0.12);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-main);
            color: var(--txt-main);
            font-family: var(--font-family);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
            padding: 40px 16px;
        }

        /* Fundo Decorativo Minimalista */
        .background-glow {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(0, 255, 115, 0.04) 0%, rgba(10, 12, 16, 0) 70%);
            top: 10%;
            left: 50%;
            transform: translateX(-50%);
            z-index: -1;
            pointer-events: none;
        }

        /* Container Principal Ajustado para Bio */
        .bio-container {
            width: 100%;
            max-width: 540px;
            z-index: 2;
        }

        /* Perfil Header */
        .profile-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .avatar-wrapper {
            position: relative;
            width: 96px;
            height: 96px;
            margin: 0 auto 16px auto;
        }

        .avatar-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid var(--glass-border);
            background: var(--bg-sec);
            padding: 4px;
        }

        .avatar-status {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 12px;
            height: 12px;
            background-color: var(--accent);
            border: 2px solid var(--bg-main);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent);
        }

        .profile-name {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 4px;
        }

        .profile-badge {
            display: inline-flex;
            align-items: center;
            background: rgba(0, 255, 115, 0.06);
            border: 1px solid rgba(0, 255, 115, 0.15);
            color: var(--accent);
            padding: 4px 12px;
            border-radius: 100px;
            font-size: 11px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .profile-bio {
            color: var(--txt-sec);
            font-size: 14px;
            font-weight: 400;
            line-height: 1.5;
        }

        /* Estatísticas Compactas */
        .mini-stats {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 16px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 8px 16px;
            font-size: 12px;
            color: var(--txt-sec);
        }

        .stat-card strong {
            color: var(--txt-main);
            font-weight: 700;
        }

        /* Grid de Links - Estilo Bento Box */
        .bento-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            width: 100%;
        }

        .bento-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--glass-bg);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid var(--glass-border);
            border-radius: 18px;
            color: var(--txt-main);
            text-decoration: none;
            padding: 16px 20px;
            font-weight: 700;
            font-size: 14px;
            min-height: 52px;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            outline: none;
        }

        /* Utilitários do Grid */
        .span-2 {
            grid-column: span 2;
        }

        .bento-item-content {
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 2;
        }

        .bento-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        .bento-item svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        .bento-arrow {
            color: rgba(255, 255, 255, 0.2);
            z-index: 2;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
        }

        /* Hover & Foco Interativo */
        .bento-item:hover {
            transform: translateY(-2px);
            border-color: rgba(0, 255, 115, 0.25);
            box-shadow: var(--glow-shadow);
            background: rgba(17, 24, 27, 0.7);
        }

        .bento-item:hover .bento-icon {
            background: rgba(0, 255, 115, 0.08);
            color: var(--accent);
        }

        .bento-item:hover .bento-arrow {
            color: var(--accent);
            transform: translateX(2px);
        }

        .bento-item:focus-visible {
            border-color: var(--accent);
            box-shadow: var(--glow-shadow);
        }

        /* Efeito Ripple */
        .ripple {
            position: absolute;
            border-radius: 50%;
            transform: scale(0);
            animation: rippleEffect 0.5s linear;
            background: rgba(0, 255, 115, 0.2);
            pointer-events: none;
            z-index: 1;
        }

        @keyframes rippleEffect {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }

        /* Rodapé Focado */
        .bio-footer {
            margin-top: 40px;
            text-align: center;
        }

        .footer-copy {
            font-size: 11px;
            color: var(--txt-sec);
            opacity: 0.6;
            margin-bottom: 8px;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 16px;
        }

        .footer-link {
            font-size: 11px;
            color: var(--txt-sec);
            opacity: 0.6;
            text-decoration: none;
            transition: opacity 0.2s ease, color 0.2s ease;
        }

        .footer-link:hover {
            opacity: 1;
            color: var(--accent);
        }

        /* Toast Notificação */
        .toast-notification {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #111827;
            border: 1px solid rgba(0, 255, 115, 0.3);
            border-radius: 12px;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), var(--glow-shadow);
            z-index: 2000;
            opacity: 0;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.4s ease;
            pointer-events: none;
            width: max-content;
        }

        .toast-notification.is-visible {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .toast-icon {
            color: var(--accent);
            display: flex;
            align-items: center;
        }

        .toast-text {
            font-size: 13px;
            font-weight: 700;
            color: var(--txt-main);
        }

        /* Animação de Entrada Controlada */
        .fade-up {
            opacity: 0;
            transform: translateY(20px);
            animation: initReveal 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes initReveal {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

    <div class="toast-notification" id="successToast" role="alert" aria-live="assertive">

            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
        </div>

    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            
            // Efeito Premium Ripple nos Cliques
            const rippleButtons = document.querySelectorAll('[data-ripple], .bento-item');
            rippleButtons.forEach(button => {
                button.addEventListener('click', function(e) {
                    const rect = this.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;
                    
                    const rippleCircle = document.createElement('span');
                    rippleCircle.classList.add('ripple');
                    rippleCircle.style.left = `${x}px`;
                    rippleCircle.style.top = `${y}px`;
                    
                    const size = Math.max(rect.width, rect.height);
                    rippleCircle.style.width = `${size}px`;
                    rippleCircle.style.height = `${size}px`;
                    
                    const previousRipple = this.querySelector('.ripple');
                    if (previousRipple) previousRipple.remove();
                    
                    this.appendChild(rippleCircle);
                });
            });

            // Toast de Sucesso Controlado
            const consultoriaBtn = document.querySelector('.action-consultoria');
            const successToast = document.getElementById('successToast');
            let toastTimeout;

            if (consultoriaBtn && successToast) {
                consultoriaBtn.addEventListener('click', () => {
                    clearTimeout(toastTimeout);
                    successToast.classList.add('is-visible');
                    toastTimeout = setTimeout(() => {
                        successToast.classList.remove('is-visible');
                    }, 3500);
                });
            }
        });
    </script>
