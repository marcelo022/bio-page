<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Marcelo Campos - Links Rápidos e Contato">
    <meta name="theme-color" content="#07090e">

    <title>Marcelo Campos | Links</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&family=Fira+Code:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <style>
        /* Variáveis Exatas do seu Portfólio */
        :root {
            --bg-base: #07090e;
            --bg-secondary: #11151e;
            --surface-glass: rgba(30, 41, 59, 0.65);
            --surface-border: rgba(255, 255, 255, 0.12);
            --text-main: #ffffff;
            --text-muted: #cbd5e1;
            --brand-color: #00ff73;
            --brand-glow: rgba(0, 255, 115, 0.25);
            --brand-gradient: linear-gradient(135deg, #00ff73 0%, #00b34a 100%);
            --font-main: 'Plus Jakarta Sans', sans-serif;
            --font-code: 'Fira Code', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            font-family: var(--font-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
            padding: 40px 16px;
            -webkit-font-smoothing: antialiased;
        }

        /* Fundo Animado (Mesh Background importado do Portfólio) */
        .mesh-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
        }

        .mesh-blob {
            position: absolute;
            filter: blur(90px);
            opacity: 0.12;
            border-radius: 50%;
            animation: float 20s infinite alternate;
        }

        .blob-1 {
            top: 10%;
            left: -10%;
            width: 50vw;
            height: 50vw;
            background: var(--brand-color);
        }

        .blob-2 {
            bottom: -20%;
            right: 10%;
            width: 60vw;
            height: 60vw;
            background: #0d6efd;
            animation-delay: -5s;
        }

        @keyframes float {
            0% {
                transform: translate(0, 0) scale(1);
            }

            100% {
                transform: translate(5%, 10%) scale(1.1);
            }
        }

        /* Container Principal */
        .bio-container {
            width: 100%;
            max-width: 500px;
            z-index: 2;
        }

        /* Perfil Header */
        .profile-header {
            text-align: center;
            margin-bottom: 32px;
        }

        /* Imagem de Perfil com seu estilo */
        .profile-image-container {
            position: relative;
            width: 110px;
            height: 110px;
            border-radius: 50%;
            padding: 3px;
            background: var(--brand-gradient);
            margin: 0 auto 16px auto;
            box-shadow: 0 10px 30px var(--brand-glow);
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .profile-image {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            background-color: var(--bg-secondary);
            border: 3px solid var(--bg-base);
        }

        .profile-status {
            position: absolute;
            bottom: 4px;
            right: 4px;
            width: 16px;
            height: 16px;
            background-color: var(--brand-color);
            border: 3px solid var(--bg-base);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--brand-color);
        }

        .profile-name {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 4px;
        }

        .profile-subtitle {
            font-family: var(--font-code);
            color: var(--brand-color);
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 12px;
            display: inline-block;
        }

        .profile-bio {
            color: var(--text-muted);
            font-size: 15px;
            font-weight: 400;
            line-height: 1.6;
        }

        /* Grid de Links - Estilo Bento Box com seu Glassmorphism */
        .bento-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            width: 100%;
        }

        .bento-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--surface-glass);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--surface-border);
            border-radius: 16px;
            color: var(--text-main);
            text-decoration: none;
            padding: 16px 20px;
            font-weight: 700;
            font-size: 14px;
            min-height: 54px;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            outline: none;
        }

        .span-2 {
            grid-column: span 2;
        }

        .bento-item-content {
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 2;
        }

        .bento-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 10px;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }

        .bento-arrow {
            color: var(--text-muted);
            z-index: 2;
            transition: all 0.3s ease;
            opacity: 0.5;
        }

        /* Hover Integrado ao Portfólio */
        .bento-item:hover {
            transform: translateY(-3px);
            border-color: rgba(0, 255, 115, 0.4);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3), 0 0 15px var(--brand-glow);
            background: var(--surface-glass);
        }

        .bento-item:hover .bento-icon {
            background: rgba(0, 255, 115, 0.1);
            color: var(--brand-color);
        }

        .bento-item:hover .bento-arrow {
            color: var(--brand-color);
            transform: translateX(4px);
            opacity: 1;
        }

        /* Destaque para o botão principal */
        .item-primary {
            background: var(--brand-gradient);
            color: #000;
            border: none;
        }

        .item-primary:hover {
            background: linear-gradient(135deg, #00ff73 0%, #00e65c 100%);
            color: #000;
        }

        .item-primary .bento-icon {
            background: rgba(0, 0, 0, 0.1);
            color: #000;
        }

        .item-primary .bento-arrow {
            color: #000;
            opacity: 1;
        }

        .item-primary:hover .bento-icon {
            background: rgba(0, 0, 0, 0.15);
            color: #000;
        }

        .item-primary:hover .bento-arrow {
            color: #000;
        }

        /* Rodapé Focado */
        .bio-footer {
            margin-top: 40px;
            text-align: center;
            font-family: var(--font-code);
        }

        .footer-copy {
            font-size: 11px;
            color: var(--text-muted);
            opacity: 0.6;
        }

        /* Animação */
        .fade-up {
            opacity: 0;
            transform: translateY(20px);
            animation: initReveal 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes initReveal {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <div class="mesh-bg">
        <div class="mesh-blob blob-1"></div>
        <div class="mesh-blob blob-2"></div>
    </div>

    <div class="bio-container fade-up">

        <header class="profile-header">
            <div class="profile-image-container">
                <img src="img/foto.jpg" alt="Foto de Marcelo Campos" class="profile-image">
                <div class="profile-status"></div>
            </div>

            <h1 class="profile-name">Marcelo Campos</h1>
            <span class="profile-subtitle">> Software_Developer</span>

            <p class="profile-bio">
                Cursando Desenvolvimento de Sistemas na <strong>ETEC João Rays</strong>. Construindo soluções digitais
                modernas e de alto impacto.
            </p>
        </header>

        <main class="bento-grid">

            <a href="https://portifolio-steel-xi-94.vercel.app/#sobre" class="bento-item item-primary span-2">
                <div class="bento-item-content">
                    <div class="bento-icon"><i class="bi bi-rocket-takeoff-fill"></i></div>
                    <span>Acessar Portfólio Completo</span>
                </div>
                <div class="bento-arrow"><i class="bi bi-arrow-right"></i></div>
            </a>

            <a href="https://wa.me/5514988000489?text=Olá%20Marcelo!%20Vim%20pelo%20seu%20link%20da%20bio."
                target="_blank" class="bento-item span-2" style="border-color: rgba(37, 211, 102, 0.3);">
                <div class="bento-item-content">
                    <div class="bento-icon" style="color: #25D366; background: rgba(37, 211, 102, 0.1);"><i
                            class="bi bi-whatsapp"></i></div>
                    <span>Iniciar Conversa no WhatsApp</span>
                </div>
                <div class="bento-arrow"><i class="bi bi-arrow-right"></i></div>
            </a>

            <a href="https://github.com/marcelo022" target="_blank" class="bento-item">
                <div class="bento-item-content">
                    <div class="bento-icon"><i class="bi bi-github"></i></div>
                    <span>GitHub</span>
                </div>
            </a>

            <a href="https://www.instagram.com/marcelocfilho2/" target="_blank" class="bento-item">
                <div class="bento-item-content">
                    <div class="bento-icon" style="color: #E1306C;"><i class="bi bi-instagram"></i></div>
                    <span>Instagram</span>
                </div>
            </a>

            <a href="docs/curriculo.pdf" target="_blank" class="bento-item span-2">
                <div class="bento-item-content">
                    <div class="bento-icon"><i class="bi bi-file-earmark-pdf"></i></div>
                    <span>Baixar Currículo (PDF)</span>
                </div>
                <div class="bento-arrow"><i class="bi bi-download"></i></div>
            </a>

        </main>

        <footer class="bio-footer">
            <p class="footer-copy">&copy; 2026 Marcelo Campos.</p>
        </footer>

    </div>

</body>

</html>
